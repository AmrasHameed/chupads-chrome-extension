<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 320px;
        background: #0a0a0a;
        color: #fff;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .header {
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #111;
        border-bottom: 1px solid #1a1a1a;
        position: relative;
        overflow: hidden;
      }
      .header::before {
        content: "";
        position: absolute;
        top: -20px;
        right: -20px;
        width: 80px;
        height: 80px;
        background: radial-gradient(
          circle,
          rgba(229, 62, 62, 0.15) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-icon {
        width: 30px;
        height: 30px;
        background: #e53e3e;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: 0 0 12px rgba(229, 62, 62, 0.4);
      }
      .logo-text {
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .logo-text span {
        color: #e53e3e;
      }
      .toggle {
        width: 40px;
        height: 22px;
        background: #e53e3e;
        border-radius: 11px;
        cursor: pointer;
        position: relative;
        transition: background 0.2s;
        box-shadow: 0 0 8px rgba(229, 62, 62, 0.3);
      }
      .toggle.off {
        background: #2a2a2a;
        box-shadow: none;
      }
      .toggle::after {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        background: white;
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition: transform 0.2s;
      }
      .toggle.on::after {
        transform: translateX(18px);
      }
      .hero {
        padding: 20px 18px 16px;
        background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
        border-bottom: 1px solid #1a1a1a;
        position: relative;
      }
      .hero-label {
        font-size: 10px;
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 4px;
      }
      .hero-number {
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        font-size: 48px;
        font-weight: 700;
        color: #e53e3e;
        line-height: 1;
        text-shadow: 0 0 30px rgba(229, 62, 62, 0.3);
        letter-spacing: -2px;
      }
      .hero-sub {
        font-size: 12px;
        color: #555;
        margin-top: 4px;
      }
      .divider-line {
        position: absolute;
        bottom: 0;
        left: 18px;
        right: 18px;
        height: 1px;
        background: linear-gradient(90deg, #e53e3e33, transparent);
      }
      .last-updated-row {
        padding: 12px 18px;
        background: #0a0a0a;
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .row-label {
        font-size: 10px;
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        color: #444;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .row-value {
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        font-size: 13px;
        color: #666;
      }
      .site-row {
        padding: 12px 18px;
        background: #0d0d0d;
        border-bottom: 1px solid #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .site-name {
        font-size: 12px;
        color: #666;
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .site-count {
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        color: #e53e3e;
        background: rgba(229, 62, 62, 0.1);
        padding: 3px 8px;
        border-radius: 20px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .actions {
        padding: 14px 18px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .btn-picker {
        width: 100%;
        padding: 11px 16px;
        background: #e53e3e;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.15s;
        box-shadow: 0 4px 16px rgba(229, 62, 62, 0.3);
        letter-spacing: 0.2px;
      }
      .btn-picker:hover {
        background: #c53030;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(229, 62, 62, 0.4);
      }
      .btn-picker:active {
        transform: scale(0.98);
      }
      .btn-secondary {
        width: 100%;
        padding: 9px 16px;
        background: transparent;
        color: #555;
        border: 1px solid #1f1f1f;
        border-radius: 8px;
        font-size: 12px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-secondary:hover {
        border-color: #333;
        color: #888;
      }
      .picked-count {
        font-size: 11px;
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        color: #444;
        text-align: center;
      }
      .footer {
        padding: 10px 18px;
        border-top: 1px solid #141414;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .footer-text {
        font-size: 10px;
        font-family: ui-monospace, "Cascadia Mono", "Segoe UI Mono", monospace;
        color: #2a2a2a;
        letter-spacing: 0.5px;
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #22c55e;
        box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
        animation: pulse 2s infinite;
      }
      .status-dot.off {
        background: #444;
        box-shadow: none;
        animation: none;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .pin-banner {
        display: none;
        padding: 10px 14px;
        background: rgba(229, 62, 62, 0.12);
        border-bottom: 1px solid rgba(229, 62, 62, 0.25);
        font-size: 11px;
        color: #ccc;
        line-height: 1.4;
      }
      .pin-banner strong {
        color: #fff;
      }
      .pin-banner button {
        margin-top: 8px;
        padding: 6px 10px;
        font-size: 11px;
        background: #e53e3e;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
      }
      .pin-dismiss {
        background: transparent !important;
        color: #666 !important;
        margin-top: 4px !important;
      }
    </style>
  </head>
  <body>
    <div class="pin-banner" id="pin-banner">
      <strong>Pin ChupAds</strong> — Click the puzzle icon
      <span aria-hidden="true">🧩</span> in Chrome, then pin this extension for
      quick access.
      <button type="button" id="pinHelpBtn">Show pin guide</button>
      <button type="button" class="pin-dismiss" id="pinDismissBtn">Dismiss</button>
    </div>
    <div class="header">
      <div class="logo">
        <div class="logo-icon">
          <img
            src="../icons/icon48.png"
            alt="Logo"
            style="width: 32px; height: 32px; object-fit: cover"
          />
        </div>
        <div class="logo-text">Chup<span>Ads</span></div>
      </div>
      <div class="toggle on" id="toggle"></div>
    </div>

    <div class="hero">
      <div class="hero-label">Total Blocked</div>
      <div class="hero-number" id="total-blocked">0</div>
      <div class="hero-sub" id="hero-sub-label">network + hidden ads on this tab</div>
      <div class="divider-line"></div>
    </div>

    <div class="last-updated-row">
      <div class="row-label">Last Updated</div>
      <div class="row-value" id="last-updated">—</div>
    </div>

    <div class="site-row">
      <div class="site-name" id="site-hostname">—</div>
      <div class="site-count" id="site-blocked">0 blocked</div>
    </div>

    <div class="actions">
      <button class="btn-secondary" id="refreshStatsBtn" type="button">
        Refresh stats
      </button>
      <button class="btn-picker" id="pickerBtn">
        <span>⊕</span>
        <span>Pick Element to Block</span>
      </button>
      <button class="btn-secondary" id="clearPickedBtn" style="display: none">
        Clear Picked Elements
      </button>
      <div class="picked-count" id="pickedCount"></div>
    </div>

    <div class="footer">
      <div class="footer-text">CHUPADS v1.1.0</div>
      <a
        href="#"
        id="openOptions"
        style="
          font-size: 10px;
          color: #555;
          text-decoration: none;
          font-family: ui-monospace, monospace;
        "
        >Settings</a
      >
      <div class="status-dot" id="statusDot"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
